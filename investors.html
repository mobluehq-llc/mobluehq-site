<main>
  <section class="content content--investors">
    <div class="section-label">Investors</div>
    <div class="section-label-line section-label-line--investors"></div>
    <div class="investors-elegant">
      <div>
        <h1 class="investors-headline">We are not raising.<br>We are listening.</h1>
        <div class="investors-headline-line"></div>
      </div>
      <form class="investor-form-elegant" id="investorForm" novalidate>
        <label class="form-question" for="senderMsg">What should MOBLUEHQ know about what you are offering?</label>
        <textarea class="form-textarea" id="senderMsg" name="message" placeholder="" required autocomplete="off" spellcheck="true"></textarea>
        <button class="submit-btn" type="submit">Submit</button>
        <div class="form-note" id="formNote" aria-live="polite"></div>
      </form>
      <script>
      (function(){
        var form = document.getElementById('investorForm');
        var ta = document.getElementById('senderMsg');
        var note = document.getElementById('formNote');
        if (!form || !ta) return;
        form.addEventListener('submit', function(e){
          e.preventDefault();
          var msg = (ta.value || '').trim();
          if (msg.length < 20) {
            note.textContent = 'Please share a few sentences about what you are offering.';
            note.className = 'form-note form-note--warn';
            return;
          }
          note.textContent = 'Sending…';
          note.className = 'form-note';
          fetch('https://formsubmit.co/ajax/' + ['bl','ue','@','moblue','hq','.com'].join(''), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify({ message: msg, _subject: 'Investor inquiry — MOBLUEHQ' })
          }).then(function(r){ if(!r.ok) throw new Error(r.status); return r.json(); })
          .then(function(){
            ta.value = '';
            note.textContent = 'Received. Thank you — we read everything.';
            note.className = 'form-note form-note--ok';
          }).catch(function(){
            note.textContent = 'Could not send — please use the contact page.';
            note.className = 'form-note form-note--warn';
          });
        });
      })();
      </script>
    </div>
  </section>
</main>
