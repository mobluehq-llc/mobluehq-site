<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Portfolio — MOBLUEHQ</title>
<meta name="description" content="The MOBLUEHQ product portfolio: verification-first tooling, education support, consumer protection, and more." />
<link rel="canonical" href="https://mobluehq.com/portfolio" />
<meta name="robots" content="index, follow" />

<meta property="og:type" content="website" />
<meta property="og:url" content="https://mobluehq.com/portfolio" />
<meta property="og:title" content="Portfolio — MOBLUEHQ" />
<meta property="og:description" content="The MOBLUEHQ product portfolio." />
<meta property="og:image" content="https://mobluehq.com/assets/earth_hero.jpg" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css">
</head>
<body>

<nav>
  <a href="/" class="nav-mark"><span class="moblue">MOBLUE</span><span class="hq">HQ</span></a>
  <ul class="nav-links">
    <li><a href="/about">About</a></li>
    <li><a href="/portfolio" class="active">Portfolio</a></li>
    <li><a href="/investors">Investors</a></li>
  </ul>
</nav>

<main>
  <section class="content content--portfolio">
    <div class="section-label">Portfolio</div>
    <div class="section-label-line section-label-line--portfolio"></div>

    <div id="portfolioRoot">
      <div class="portfolio-loading">Loading portfolio</div>
    </div>

    <div class="portfolio-meta" id="portfolioMeta"></div>
  </section>
</main>

<footer>
  <div class="footer-mark"><span class="moblue">MOBLUE</span><span class="hq">HQ</span></div>
  <div>© 2026 MOBLUEHQ LLC · Delaware</div>
</footer>

<script>
function escapeHtml(str) {
  if (typeof str !== 'string') return '';
  return str.replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
}

function logoSources(logoPath) {
  const svg = logoPath.endsWith('.svg') ? logoPath : logoPath.replace(/\.png$/i, '.svg');
  const png = svg.replace(/\.svg$/i, '.png');
  return { svg, png };
}

function buildTile(p) {
  const card = document.createElement('article');
  card.className = 'portfolio-card';
  card.setAttribute('data-brand', p.id);

  const tile = document.createElement('div');
  tile.className = 'portfolio-tile';

  const logoWrap = document.createElement('div');
  logoWrap.className = 'portfolio-tile-logo-wrap';
  const img = document.createElement('img');
  img.className = 'portfolio-tile-logo';
  img.alt = escapeHtml(p.name);
  img.loading = 'lazy';
  const sources = logoSources(p.logo);
  img.src = sources.svg;
  img.onerror = function onLogoErr() {
    if (this.src.endsWith('.svg')) {
      this.src = sources.png;
      return;
    }
    this.onerror = null;
    this.style.opacity = '0.35';
  };

  logoWrap.appendChild(img);
  tile.appendChild(logoWrap);

  const meta = document.createElement('div');
  meta.className = 'portfolio-card-meta';

  const nameRow = document.createElement('div');
  nameRow.className = 'portfolio-card-name-row';
  const nameEl = document.createElement('span');
  nameEl.className = 'portfolio-card-name';
  nameEl.textContent = p.name;
  const badge = document.createElement('span');
  badge.className = 'portfolio-tile-badge portfolio-tile-badge--' + p.status;
  badge.textContent = p.status === 'active' ? 'Active' : 'In development';

  nameRow.appendChild(nameEl);
  nameRow.appendChild(badge);

  const desc = document.createElement('p');
  desc.className = 'portfolio-card-desc';
  desc.textContent = p.description;

  meta.appendChild(nameRow);
  meta.appendChild(desc);

  card.appendChild(tile);
  card.appendChild(meta);
  return card;
}

function buildSection(title, products) {
  const block = document.createElement('div');
  block.className = 'portfolio-section portfolio-section-block';

  const h = document.createElement('h2');
  h.className = 'portfolio-section-title';
  h.textContent = title;

  const grid = document.createElement('div');
  grid.className = 'portfolio-grid';
  products.forEach(p => grid.appendChild(buildTile(p)));

  block.appendChild(h);
  block.appendChild(grid);
  return block;
}

async function loadPortfolio() {
  const root = document.getElementById('portfolioRoot');
  const metaEl = document.getElementById('portfolioMeta');
  try {
    const response = await fetch('/data/products.json', { cache: 'no-cache' });
    if (!response.ok) throw new Error('Failed to load products.json');
    const data = await response.json();

    const active = data.products.filter(p => p.status === 'active');
    const dev = data.products.filter(p => p.status === 'dev');

    root.innerHTML = '';
    if (active.length) root.appendChild(buildSection('Active', active));
    if (dev.length) root.appendChild(buildSection('In Development', dev));

    if (metaEl && data.lastReviewed) {
      metaEl.textContent = 'Portfolio last reviewed ' + data.lastReviewed;
    }
  } catch (err) {
    console.error('Portfolio load failed:', err);
    root.innerHTML = '<div class="portfolio-loading">Portfolio temporarily unavailable</div>';
  }
}

loadPortfolio();
</script>

</body>
</html>
