</footer>

<script>
/** Bust immutable year-long /assets/* cache when CSS or logos change (see vercel.json). */
var MOBLUE_ASSET_V = '14';

function escapeHtml(str) {
  if (typeof str !== 'string') return '';
  return str.replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
}

function cacheBustAssetUrl(url) {
  if (!url || typeof url !== 'string') return '';
  var sep = url.indexOf('?') >= 0 ? '&' : '?';
  return url + sep + 'v=' + MOBLUE_ASSET_V;
}

function logoSources(logoPath) {
  var svg = logoPath.endsWith('.svg') ? logoPath : logoPath.replace(/\.png$/i, '.svg');
  var png = svg.replace(/\.svg$/i, '.png');
  return { svg: svg, png: png };
}

function buildTile(p) {
  const card = document.createElement('article');
  card.className = 'portfolio-card';
  card.setAttribute('data-brand', p.id);

  const tile = document.createElement('div');
  tile.className = 'portfolio-tile';

  const logoWrap = document.createElement('div');
  logoWrap.className = 'portfolio-tile-logo-wrap';
  const img = document.createElement('img');
  img.className = 'portfolio-tile-logo';
  img.alt = escapeHtml(p.name);
  img.loading = 'lazy';
    const sources = logoSources(p.logo);
    var preferPng = /\.png$/i.test(p.logo);
    var triedFallback = false;
    img.src = cacheBustAssetUrl(preferPng ? sources.png : sources.svg);
    img.onerror = function onLogoErr() {
      if (!triedFallback) {
        triedFallback = true;
        this.src = cacheBustAssetUrl(preferPng ? sources.svg : sources.png);
        return;
      }
      this.onerror = null;
      this.style.opacity = '0.35';
    };

  logoWrap.appendChild(img);
  tile.appendChild(logoWrap);

  const meta = document.createElement('div');
  meta.className = 'portfolio-card-meta';

  const nameRow = document.createElement('div');
  nameRow.className = 'portfolio-card-name-row';
  const nameEl = document.createElement('span');
  nameEl.className = 'portfolio-card-name';
  nameEl.textContent = p.name;
  const badge = document.createElement('span');
  badge.className = 'portfolio-tile-badge portfolio-tile-badge--' + p.status;
  badge.textContent =
    p.status === 'active_mvp'
      ? 'Active MVP'
      : p.status === 'near_mvp'
        ? 'Near MVP'
        : p.status === 'dev'
          ? 'In Development'
          : p.status;

  nameRow.appendChild(nameEl);
  nameRow.appendChild(badge);

  const desc = document.createElement('p');
  desc.className = 'portfolio-card-desc';
  desc.textContent = p.description;

  meta.appendChild(nameRow);
  meta.appendChild(desc);

  if (
    (p.status === 'near_mvp' || p.status === 'dev') &&
    Array.isArray(p.blockers) &&
    p.blockers.length
  ) {
    const blockersEl = document.createElement('p');
    blockersEl.className = 'portfolio-card-blockers';
    blockersEl.textContent = 'Blocked on: ' + p.blockers.join(', ');
    meta.appendChild(blockersEl);
  }

  card.appendChild(tile);
  card.appendChild(meta);
  return card;
}

var PORTFOLIO_EMPTY_SECTION =
  'Nothing here yet — by design. We launch with planned media events on real domains, not soft soft-launches on subdomains.';

function buildSection(title, products) {
  const block = document.createElement('div');
  block.className = 'portfolio-section portfolio-section-block';

  const h = document.createElement('h2');
  h.className = 'portfolio-section-title';
  h.textContent = title;

  block.appendChild(h);

  if (!products.length) {
    const empty = document.createElement('p');
    empty.className = 'portfolio-section-empty';
    empty.textContent = PORTFOLIO_EMPTY_SECTION;
    block.appendChild(empty);
    return block;
  }

  const grid = document.createElement('div');
  grid.className = 'portfolio-grid';
  products.forEach(p => grid.appendChild(buildTile(p)));
  block.appendChild(grid);
  return block;
}

async function loadPortfolio() {
  const root = document.getElementById('portfolioRoot');
  const metaEl = document.getElementById('portfolioMeta');
  try {
    const response = await fetch('/data/products.json', { cache: 'no-cache' });
    if (!response.ok) throw new Error('Failed to load products.json');
    const data = await response.json();

    const active_mvp = data.products.filter(p => p.status === 'active_mvp');
    const near_mvp = data.products.filter(p => p.status === 'near_mvp');
    const dev = data.products.filter(p => p.status === 'dev');

    root.innerHTML = '';
    root.appendChild(buildSection('Active MVP', active_mvp));
    root.appendChild(buildSection('Near MVP', near_mvp));
    root.appendChild(buildSection('In Development', dev));

    if (metaEl && data.lastReviewed) {
      metaEl.textContent = 'Portfolio last reviewed ' + data.lastReviewed;
    }
  } catch (err) {
    console.error('Portfolio load failed:', err);
    root.innerHTML = '<div class="portfolio-loading">Portfolio temporarily unavailable</div>';
  }
}

loadPortfolio();
</script>
