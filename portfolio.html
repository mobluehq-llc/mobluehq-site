<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Portfolio — MOBLUEHQ</title>
<meta name="description" content="The MOBLUEHQ product portfolio: verification engines, distributed compute, consumer protection, and more." />
<link rel="canonical" href="https://mobluehq.com/portfolio" />
<meta name="robots" content="index, follow" />

<meta property="og:type" content="website" />
<meta property="og:url" content="https://mobluehq.com/portfolio" />
<meta property="og:title" content="Portfolio — MOBLUEHQ" />
<meta property="og:description" content="The MOBLUEHQ product portfolio." />
<meta property="og:image" content="https://mobluehq.com/assets/earth_hero.jpg" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css">
</head>
<body>

<nav>
  <a href="/" class="nav-mark"><span class="moblue">MOBLUE</span><span class="hq">HQ</span></a>
  <ul class="nav-links">
    <li><a href="/about">About</a></li>
    <li><a href="/portfolio" class="active">Portfolio</a></li>
    <li><a href="/investors">Investors</a></li>
  </ul>
</nav>

<main>
  <section class="content">
    <div class="section-label">Portfolio</div>
    <div class="section-label-line"></div>

    <div class="portfolio-header">
      <div></div>
      <div class="portfolio-legend">
        <div class="legend-item"><span class="legend-dot active"></span>Active</div>
        <div class="legend-item"><span class="legend-dot dev"></span>In Development</div>
      </div>
    </div>

    <div class="portfolio-grid" id="brandGrid">
      <div class="portfolio-loading">Loading portfolio</div>
    </div>

    <div class="portfolio-meta" id="portfolioMeta"></div>
  </section>
</main>

<footer>
  <div class="footer-mark"><span class="moblue">MOBLUE</span><span class="hq">HQ</span></div>
  <div>© 2026 MOBLUEHQ LLC · Delaware</div>
</footer>

<script>
async function loadPortfolio() {
  const grid = document.getElementById('brandGrid');
  const metaEl = document.getElementById('portfolioMeta');
  try {
    const response = await fetch('/data/products.json', { cache: 'no-cache' });
    if (!response.ok) throw new Error('Failed to load products.json');
    const data = await response.json();

    grid.innerHTML = '';
    data.products.forEach(p => {
      const card = document.createElement('div');
      card.className = 'portfolio-card';
      card.setAttribute('data-brand', p.id);

      card.innerHTML = `
        <div class="portfolio-icon-tile">
          <img class="portfolio-icon-img" src="${escapeHtml(p.logo)}" alt="${escapeHtml(p.name)}" loading="lazy" />
        </div>
        <div class="portfolio-card-meta">
          <div class="portfolio-card-name">
            ${escapeHtml(p.name)}
            <span class="portfolio-card-status ${escapeHtml(p.status)}"></span>
          </div>
          <div class="portfolio-card-tag">${escapeHtml(p.description)}</div>
        </div>
      `;
      grid.appendChild(card);
    });

    if (metaEl && data.lastReviewed) {
      metaEl.textContent = `Portfolio last reviewed ${data.lastReviewed}`;
    }
  } catch (err) {
    console.error('Portfolio load failed:', err);
    grid.innerHTML = '<div class="portfolio-loading">Portfolio temporarily unavailable</div>';
  }
}

function escapeHtml(str) {
  if (typeof str !== 'string') return '';
  return str.replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
}

loadPortfolio();
</script>

</body>
</html>
