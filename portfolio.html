<script>
/** Bust immutable year-long /assets/* cache when CSS or logos change (see vercel.json). */
var MOBLUE_ASSET_V = '20';

function escapeHtml(str) {
  if (typeof str !== 'string') return '';
  return str.replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' })[c]);
}

function cacheBustAssetUrl(url) {
  if (!url || typeof url !== 'string') return '';
  var sep = url.indexOf('?') >= 0 ? '&' : '?';
  return url + sep + 'v=' + MOBLUE_ASSET_V;
}

function logoSources(logoPath) {
  var svg = logoPath.endsWith('.svg') ? logoPath : logoPath.replace(/\.png$/i, '.svg');
  var png = svg.replace(/\.svg$/i, '.png');
  return { svg: svg, png: png };
}

function buildTile(p) {
  const card = document.createElement('article');
  card.className = 'portfolio-card';
  card.setAttribute('data-brand', p.id);

  const tile = document.createElement('div');
  tile.className = 'portfolio-tile';

  const logoWrap = document.createElement('div');
  logoWrap.className = 'portfolio-tile-logo-wrap';
  const img = document.createElement('img');
  img.className = 'portfolio-tile-logo';
  img.alt = escapeHtml(p.name);
  img.loading = 'lazy';
    const sources = logoSources(p.logo);
    var preferPng = /\.png$/i.test(p.logo);
    var triedFallback = false;
    img.src = cacheBustAssetUrl(preferPng ? sources.png : sources.svg);
    img.onerror = function onLogoErr() {
      if (!triedFallback) {
        triedFallback = true;
        this.src = cacheBustAssetUrl(preferPng ? sources.svg : sources.png);
        return;
      }
      this.onerror = null;
      this.style.opacity = '0.35';
    };

  logoWrap.appendChild(img);
  tile.appendChild(logoWrap);

  const meta = document.createElement('div');
  meta.className = 'portfolio-card-meta';

  const nameRow = document.createElement('div');
  nameRow.className = 'portfolio-card-name-row';
  const nameEl = document.createElement('span');
  nameEl.className = 'portfolio-card-name';
  nameEl.textContent = p.name;
  const badge = document.createElement('span');
  badge.className = 'portfolio-tile-badge portfolio-tile-badge--' + p.status;
  badge.textContent =
    p.status === 'active_mvp'
      ? 'Active MVP'
      : p.status === 'demo'
        ? 'Demo Available'
        : p.status === 'near_mvp'
          ? 'Near MVP'
          : p.status === 'dev'
            ? 'In Development'
            : p.status === 'concept'
              ? 'Platform-Ready'
              : p.status;

  nameRow.appendChild(nameEl);
  nameRow.appendChild(badge);
  if (p.stage_label) {
    const st = document.createElement('span');
    st.className = 'portfolio-tile-badge';
    st.style.cssText =
      'margin-left:6px;color:#4D9FFF;border:1px solid rgba(77,159,255,0.45);border-radius:4px;padding:1px 6px;font-size:10px;letter-spacing:0.06em';
    st.textContent = p.stage_label;
    nameRow.appendChild(st);
  }
  if (p.patent_pending) {
    const pp = document.createElement('span');
    pp.className = 'portfolio-tile-badge';
    pp.style.cssText = 'margin-left:6px;opacity:0.75';
    pp.textContent = 'Patent pending';
    nameRow.appendChild(pp);
  } else if (p.badges_redacted) {
    const pp = document.createElement('span');
    pp.className = 'portfolio-tile-badge';
    pp.style.cssText =
      'margin-left:6px;opacity:0.75;filter:blur(4px);user-select:none;pointer-events:none';
    pp.setAttribute('aria-hidden', 'true');
    pp.textContent = 'Undisclosed';
    nameRow.appendChild(pp);
  }

  if (p.on_device) {
    const odb = document.createElement('span');
    odb.className = 'portfolio-tile-badge';
    odb.style.cssText = 'margin-left:6px;color:#3DD68C;border:1px solid rgba(61,214,140,0.45);border-radius:4px;padding:1px 6px;font-size:10px;letter-spacing:0.06em';
    odb.textContent = 'On-device';
    nameRow.appendChild(odb);
  }
  const desc = document.createElement('p');
  desc.className = 'portfolio-card-desc';
  var BLUR_PLACEHOLDER =
    'Details intentionally withheld for now. More about this concept will be published here at a later date.';
  var BLUR_CSS = 'filter:blur(5px);user-select:none;pointer-events:none';
  if (p.redacted) {
    desc.textContent = BLUR_PLACEHOLDER;
    desc.style.cssText = BLUR_CSS;
    desc.setAttribute('aria-hidden', 'true');
  } else if (p.redacted_tail) {
    desc.appendChild(document.createTextNode(p.description || ''));
    if (p.description_bold) {
      const strongEl = document.createElement('strong');
      strongEl.textContent = p.description_bold;
      strongEl.style.color = '#FFFFFF';
      desc.appendChild(strongEl);
    }
    const blurSpan = document.createElement('span');
    blurSpan.textContent = 'Details withheld here until this ships.';
    blurSpan.style.cssText = BLUR_CSS;
    blurSpan.setAttribute('aria-hidden', 'true');
    desc.appendChild(blurSpan);
    if (p.description_after) {
      desc.appendChild(document.createTextNode(p.description_after));
    }
  } else {
    desc.textContent = p.description;
  }

  meta.appendChild(nameRow);
  meta.appendChild(desc);

  if (
    (p.status === 'near_mvp' || p.status === 'dev') &&
    Array.isArray(p.blockers) &&
    p.blockers.length
  ) {
    const blockersEl = document.createElement('p');
    blockersEl.className = 'portfolio-card-blockers';
    blockersEl.textContent = 'Blocked on: ' + p.blockers.join(', ');
    meta.appendChild(blockersEl);
  }

  card.appendChild(tile);
  card.appendChild(meta);
  return card;
}

var PORTFOLIO_EMPTY_SECTION =
  'Nothing here yet — by design. We launch with planned media events on real domains, not soft soft-launches on subdomains.';

function buildSection(title, products, subtitle) {
  const block = document.createElement('div');
  block.className = 'portfolio-section portfolio-section-block';

  const h = document.createElement('h2');
  h.className = 'portfolio-section-title';
  h.textContent = title;

  block.appendChild(h);

  if (subtitle) {
    const sub = document.createElement('p');
    sub.className = 'portfolio-section-subtitle';
    sub.textContent = subtitle;
    block.appendChild(sub);
  }

  if (!products.length) {
    const empty = document.createElement('p');
    empty.className = 'portfolio-section-empty';
    empty.textContent = PORTFOLIO_EMPTY_SECTION;
    block.appendChild(empty);
    return block;
  }

  const grid = document.createElement('div');
  grid.className = 'portfolio-grid';
  products.forEach(p => grid.appendChild(buildTile(p)));
  block.appendChild(grid);
  return block;
}

async function loadPortfolio() {
  const root = document.getElementById('portfolioRoot');
  const metaEl = document.getElementById('portfolioMeta');
  try {
    const response = await fetch('/data/products.json', { cache: 'no-cache' });
    if (!response.ok) throw new Error('Failed to load products.json');
    const data = await response.json();

    const active_mvp = data.products.filter(p => p.status === 'active_mvp');
    const demo = data.products.filter(p => p.status === 'demo');
    const dev = data.products.filter(p => p.status === 'dev');
    const ready = data.products.filter(p => p.status === 'concept');

    root.innerHTML = '';
    root.appendChild(buildSection('Active MVP', active_mvp,
      'Working software you can use or demo today.'));
    if (demo.length) {
      root.appendChild(buildSection('Demo Available', demo,
        'Working software, shown privately. Use the contact link below to request a session.'));
    }
    root.appendChild(buildSection('In Development', dev,
      'In active build on the shared verification API. The foundation most of these depend on is being developed in parallel with our current program; each product\'s domain pack, interface, and validation follow.'));
    root.appendChild(buildSection('Platform-Ready', ready,
      'Not speculative. Each is the proven engine - verification council, signed receipts, on-device runtime, PII and egress controls - pointed at a new domain. The infrastructure is built; what remains is the vertical pack: criteria, data, UI, and validation.'));

    if (metaEl && data.lastReviewed) {
      metaEl.textContent = 'Portfolio last reviewed ' + data.lastReviewed;
    }
  } catch (err) {
    console.error('Portfolio load failed:', err);
    root.innerHTML = '<div class="portfolio-loading">Portfolio temporarily unavailable</div>';
  }
}

loadPortfolio();
</script>
