<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact — MOBLUEHQ</title>
<meta name="description" content="Contact MOBLUEHQ — demo requests, licensing, and pilots." />
<link rel="canonical" href="https://www.mobluehq.com/contact" />
<meta name="robots" content="index, follow" />

<link rel="icon" href="/favicon.ico" sizes="32x32" />
<link rel="icon" type="image/png" href="/assets/favicon-v2.png" sizes="48x48" />
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/style.css?v=8">
</head>
<body>

<a class="skip-link" href="#main-content">Skip to content</a>

<nav aria-label="Primary">
  <a href="/" class="nav-mark"><span class="moblue">MOBLUE</span><span class="hq">HQ</span></a>
  <ul class="nav-links">
    <li><a href="/about">About</a></li>
    <li><a href="/portfolio">Portfolio</a></li>
    <li><a href="/investors">Investors</a></li>
  </ul>
</nav>

<main id="main-content">
  <section class="content">
    <h1 class="section-label">Contact</h1>
    <div class="section-label-line"></div>

    <form class="investor-form-elegant" id="contactForm" novalidate>
      <input type="text" name="_honey" id="leadHoney" style="display:none" tabindex="-1" autocomplete="off" aria-hidden="true" />
      <input type="hidden" name="segment" id="leadSegment" value="" />
      <input type="hidden" name="plan_interest" id="leadPlan" value="" />
      <label class="form-question" for="senderName">Name</label>
      <textarea class="form-textarea" id="senderName" name="name" rows="1" required autocomplete="off" spellcheck="false"></textarea>
      <label class="form-question" for="senderEmail">Email</label>
      <textarea class="form-textarea" id="senderEmail" name="email" rows="1" required autocomplete="off" spellcheck="false"></textarea>
      <label class="form-question" for="senderMsg">What can MOBLUEHQ help with — demo request, licensing, pilot, or something else?</label>
      <textarea class="form-textarea" id="senderMsg" name="message" required autocomplete="off" spellcheck="true"></textarea>
      <button class="submit-btn" type="submit">Submit</button>
      <div class="form-note" id="formNote" aria-live="polite"></div>
    </form>
  </section>
</main>

<footer>
  <div class="footer-mark"><span class="moblue">MOBLUE</span><span class="hq">HQ</span></div>
  <div class="footer-links">
    <a href="/trust">Trust</a>
    <a href="/pricing">Pricing</a>
      <a href="/terms">Terms</a>
    <a href="/privacy">Privacy</a>
  </div>
  <div>© 2026 MOBLUEHQ LLC · Delaware</div>
</footer>

<script src="/assets/endpoints.js"></script>
<script>
(function () {
  var params = new URLSearchParams(window.location.search);
  var segment = params.get('segment');
  var plan = params.get('plan');
  if (segment === 'self_serve' || segment === 'enterprise') {
    document.getElementById('leadSegment').value = segment;
  }
  if (plan) {
    document.getElementById('leadPlan').value = plan;
  }

  var form = document.getElementById('contactForm');
  var note = document.getElementById('formNote');
  var leadUrl = (window.MOBLUEHQ_ENDPOINTS && window.MOBLUEHQ_ENDPOINTS.LEAD_INGEST_URL) || '';

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    var name = document.getElementById('senderName').value.trim();
    var email = document.getElementById('senderEmail').value.trim();
    var msg = document.getElementById('senderMsg').value.trim();
    if (!name || !email || !msg) { note.textContent = 'Please fill in all fields.'; return; }
    if (!leadUrl) { note.textContent = 'Could not send — please try again.'; return; }
    note.textContent = 'Sending…';
    try {
      var payload = {
        id: (typeof crypto !== 'undefined' && crypto.randomUUID) ? crypto.randomUUID() : String(Date.now()),
        name: name,
        email: email,
        message: msg,
        _honey: document.getElementById('leadHoney').value
      };
      var segmentVal = document.getElementById('leadSegment').value;
      var planVal = document.getElementById('leadPlan').value;
      if (segmentVal) payload.segment = segmentVal;
      if (planVal) payload.plan_interest = planVal;

      var r = await fetch(leadUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json', 'Idempotency-Key': payload.id },
        body: JSON.stringify(payload)
      });
      if (r.ok) { note.textContent = 'Sent. You will hear back soon.'; form.reset(); }
      else { note.textContent = 'Could not send — please try again.'; }
    } catch (err) {
      note.textContent = 'Could not send — please try again.';
    }
  });
})();
</script>

</body>
</html>
