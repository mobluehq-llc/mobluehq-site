<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Contact — MOBLUEHQ</title>
    <meta name="robots" content="index,follow" />
    <link rel="stylesheet" href="/assets/style.css" />
    <link rel="icon" href="/assets/favicon.png" />
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="/"
        ><span class="moblue">MOBLUE</span><span class="hq">HQ</span></a
      >
      <nav>
        <a href="/about">About</a>
        <a href="/portfolio">Portfolio</a>
        <a href="/investors">Investors</a>
      </nav>
    </header>
    <main class="page-main" style="max-width: 560px; margin: 0 auto; padding: 48px 24px">
      <h1>Contact</h1>
      <p style="opacity: 0.8">
        Demo requests, licensing, pilots, or anything else — messages go
        straight to the founder.
      </p>
      <form id="contactForm" autocomplete="off">
        <input type="text" name="_honey" style="display: none" tabindex="-1" />
        <label style="display: block; margin: 16px 0 6px">Name</label>
        <input name="name" required style="width: 100%; padding: 10px" />
        <label style="display: block; margin: 16px 0 6px">Email</label>
        <input name="email" type="email" required style="width: 100%; padding: 10px" />
        <label style="display: block; margin: 16px 0 6px">Message</label>
        <textarea name="message" rows="6" required style="width: 100%; padding: 10px"></textarea>
        <button
          type="submit"
          style="margin-top: 18px; padding: 10px 22px; background: #4d9fff; color: #080c14; border: 0; border-radius: 6px; font-weight: 600; cursor: pointer"
        >
          Send
        </button>
        <p id="contactStatus" style="margin-top: 12px"></p>
      </form>
    </main>
    <footer>
      <div class="footer-mark"><span class="moblue">MOBLUE</span><span class="hq">HQ</span></div>
      <div class="footer-links"><a href="/contact">Contact</a></div>
    </footer>
    <script>
      // Endpoint assembled at runtime; the address never appears in source.
      var _p = ['bl', 'ue', '@', 'moblue', 'hq', '.com'];
      var _ep = 'https://formsubmit.co/ajax/' + _p.join('');
      document.getElementById('contactForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        var f = e.target;
        var s = document.getElementById('contactStatus');
        s.textContent = 'Sending…';
        try {
          var r = await fetch(_ep, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
            body: JSON.stringify({
              name: f.name.value,
              email: f.email.value,
              message: f.message.value,
              _subject: 'MOBLUEHQ contact form',
            }),
          });
          s.textContent = r.ok
            ? 'Sent. Thank you — you will hear back soon.'
            : 'Something went wrong. Please try again.';
          if (r.ok) f.reset();
        } catch (err) {
          s.textContent = 'Something went wrong. Please try again.';
        }
      });
    </script>
  </body>
</html>
